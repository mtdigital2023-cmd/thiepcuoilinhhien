    <title>Thiệp Cưới Online - Mai Linh & Văn Hiển</title>

    <style>
        :root {
            --primary-color: #4a5a6a;
            --accent-color: #c5a880;
            --text-dark: #2c3e50;
            --text-light: #6f7c85;
            --bg-cream: #faf8f5;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #eae5dc;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
            overflow-x: hidden; /* Tránh thanh cuộn ngang do hiệu ứng tim */
        }

        /* Hiệu ứng trái tim rơi */
        .falling-heart {
            position: fixed;
            top: -10vh;
            z-index: 9999;
            pointer-events: none;
            animation: fall linear forwards;
            text-shadow: 0 0 4px rgba(0,0,0,0.1);
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) translateX(30px) rotate(360deg);
                opacity: 0.2;
            }
        }

        /* Thẻ thiệp chính */
        .wedding-card {
            background-color: var(--bg-cream);
            max-width: 500px;
            width: 100%;
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            border: 8px solid #ffffff;
            animation: fadeIn 1.2s ease-out;
            margin-bottom: 30px;
            z-index: 10;
        }

        /* Hiệu ứng viền hoa văn góc */
        .wedding-card::before {
            content: '';
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(197, 168, 128, 0.4);
            border-radius: 12px;
            pointer-events: none;
        }

        .header-banner {
            padding: 40px 30px 10px 30px;
            text-align: center;
            position: relative;
        }

        /* Hoa văn màu nước phía trên */
        .flower-top {
            width: 120px;
            margin: 0 auto 15px auto;
            display: block;
            opacity: 0.8;
        }

        /* Khu vực hiển thị tên khách mời động */
        .guest-welcome-box {
            text-align: center;
            margin: 15px 0 25px 0;
            padding: 15px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px dashed var(--accent-color);
        }

        .guest-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-light);
            margin-bottom: 8px;
            display: block;
        }

        .guest-name {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--primary-color);
            font-style: italic;
        }

        /* Khu vực tên cô dâu chú rể */
        .couple-names {
            padding: 10px 0;
            text-align: center;
        }

        .name-glow {
            font-family: 'Alex Brush', cursive;
            font-size: 48px;
            color: var(--primary-color);
            line-height: 1.2;
            display: block;
            animation: gentleFloat 4s ease-in-out infinite alternate;
        }

        .ampersand {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 24px;
            color: var(--accent-color);
            margin: 10px 0;
            display: block;
        }

            font-size: 18px;
            color: var(--accent-color);
            margin: 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
